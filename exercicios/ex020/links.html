<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>

        /*
            #   = id
            .   = class
            :   = pseudo-class
            ::  = pseudo-element
            >   = children (filho)
        */
        body {
            font-family: poppins;
        }

        a {
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: darkred;
        }

        .especial {
            background-color: lightcoral;
        }

        a:hover {
            color: black;
            text-decoration: underline;
        }

        a:active {
            color: yellow;
        }
    </style>
</head>
<body>
    <h1>Personalizando Itens</h1>
    <ul>
        <li><a href="https://github.com/tiagoocostadev" target="_blank">GitHub</a></li>
        <li><a href="https://www.youtube.com/@tiagocostadev" target="_blank" class="especial">Canal do YouTube</a></li>
        <li><a href="https://www.linkedin.com/in/tiagocostadev/" target="_blank" class="especial">LinkedIn</a></li>
    </ul>
</body>
</html>
